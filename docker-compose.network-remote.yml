# Docker Compose: backend + frontend only
# Run on Windows PC (192.168.1.170) where MongoDB already runs
# - MongoDB: same host → host.docker.internal
# - PostgreSQL: remote (192.168.1.151)
#
# Usage on Windows PC:
#   docker compose -f docker-compose.network-remote.yml up -d --build
#
# Access: http://localhost or http://192.168.1.170

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kapiva-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.network
    environment:
      POSTGRES_HOST: 192.168.1.151
      MONGODB_URL: mongodb://root:rootpassword@host.docker.internal:27017
      ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kapiva-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
