# Docker Compose for running Kapiva on another PC (same network)
# Usage: copy project to the other PC, configure .env, then:
#   docker compose -f docker-compose.network.yml up -d --build
#
# Access from any PC on the network: http://<THIS_PC_IP>:80

services:
  postgres:
    image: postgres:15-alpine
    container_name: kapiva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: LOGTEC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    container_name: kapiva-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kapiva-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.network
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MONGODB_URL: mongodb://mongo:27017
      ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kapiva-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: {}
  mongo_data: {}
