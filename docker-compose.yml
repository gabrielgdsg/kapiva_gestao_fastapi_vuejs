services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kapiva-backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./db_mongo:/db_mongo
    restart: always

  frontend:
    container_name: kapiva-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
