# Dev stack: hot reload. Backend and frontend auto-restart on code/config changes.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: kapiva-backend-dev
    container_name: kapiva-backend-dev
    # Dev runner: watches .env + Python files and restarts uvicorn so .env changes apply without manual restart
    command: ["python", "run_dev.py"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/gmail:/app/gmail
      - ./backend/extraction:/app/extraction
      - ./backend/run_dev.py:/app/run_dev.py
      - ./backend/.env:/app/.env
      - ./backend/uploads:/app/uploads
      - ./db_mongo:/db_mongo
    ports:
      - "8000:8000"
    # Fallback if .env not mounted; run_dev.py also loads .env from file on each restart
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: kapiva-frontend-dev
    container_name: kapiva-frontend-dev
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VUE_APP_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  frontend_node_modules: {}
